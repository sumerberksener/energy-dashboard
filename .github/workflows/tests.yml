name: Tests

# Pure-logic tests run on every push and PR. Fetcher tests skip cleanly
# when secrets aren't available (e.g. pull requests from forks); they run
# fully on pushes to main with secrets configured.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          ENTSOE_TOKEN: ${{ secrets.ENTSOE_TOKEN }}
          AGSI_TOKEN: ${{ secrets.AGSI_TOKEN }}
        run: pytest -q
