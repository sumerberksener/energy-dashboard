name: Daily Desk Brief

# Generates the daily energy desk note and commits artifacts back to the repo.
# Demonstrates the automation requirement of the brief: a recurring,
# unattended workflow that pulls public data, generates charts, calls
# the AI, and produces a Markdown brief.

on:
  schedule:
    # 07:30 UTC weekdays — captures yesterday's settlements before EU markets open.
    - cron: "30 7 * * 1-5"
  workflow_dispatch:  # also runnable on demand from the Actions tab

permissions:
  contents: write  # needed to commit generated artifacts

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate desk note
        env:
          ENTSOE_TOKEN: ${{ secrets.ENTSOE_TOKEN }}
          AGSI_TOKEN: ${{ secrets.AGSI_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_brief.py

      - name: Commit and push artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ ai/logs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily brief $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
